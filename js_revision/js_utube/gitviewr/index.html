<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Profile Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.0TTbmRA81EDAtZug5tXG3wHaHa%3Fpid%3DApi&f=1&ipt=01e656c0edb51eea4b78ba7178970ffdff4a014eb0b32163f4c881130e9f5776&ipo=images"
    />
  </head>
  <body>
    <div class="main">
      <div class="box">
        <h1>Github Profile Viewer</h1>
        <div class="firstdiv">
          <div class="searchbox">
            <input type="text" class="name" />
            <button id="searchbtn">Search</button>
          </div>
        </div>
        <div class="secondDiv">
          <div class="leftdiv">
            <img src="https://avatars.githubusercontent.com/u/131138313?v=4" />
            <h5>Name</h5>
            <p>Role</p>
          </div>
          <div class="rightdiv">
            <div class="profileinfo">
              <div class="follower">
                <h5>Followers</h5>
                <p>4</p>
              </div>
              <div class="following">
                <h5>Following</h5>
                <p>4</p>
              </div>
              <div class="repo">
                <h5>Repositry</h5>
                <p>4</p>
              </div>
            </div>
            <div class="viewprofile"><button>View profile</button></div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
